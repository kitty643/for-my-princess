<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Door 🔐</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="stars"></div>
<div class="petals"></div>



<section class="hero">


<div class="glass-card">


<h1>
🔐 A Secret For You
</h1>


<h2>
My Princess Aakriti 👑
</h2>



<p class="intro">

There is one last surprise waiting for you...

Only my Princess can open it ❤️

</p>



<div class="lock">

🔒

</div>



<input 
type="password" 
id="password"
placeholder="Enter magical word">


<br>



<button onclick="unlock()">

Unlock My Heart ❤️

</button>



<p id="wrong"></p>



</div>


</section>




<script>


function unlock(){


let pass=document.getElementById("password").value;


if(pass==="princess"){


document.querySelector(".lock").innerHTML="🔓";


setTimeout(()=>{

window.location.href="secret.html";

},1200);



}

else{


document.getElementById("wrong").innerHTML=

"Try again Princess... 👑";


}


}



</script>



</body>

</html>
